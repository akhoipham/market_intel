name: Update dashboard

on:
  schedule:
    # Every 10 minutes, 24/7. Public repos get unlimited Actions minutes, so
    # there is no cost reason to restrict to market hours; round-the-clock keeps
    # the dashboard's "data age" fresh whenever anyone checks (incl. evenings,
    # weekends, and non-US timezones). GitHub cron is UTC and best-effort —
    # high-frequency schedules get throttled, so */10 is more reliable than */5.
    - cron: "*/10 * * * *"
    # Weekly SEC ticker refresh trigger (Sunday 06:00 UTC)
    - cron: "0 6 * * 0"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Weekly ticker refresh (Sundays only)
        if: github.event.schedule == '0 6 * * 0'
        run: python run.py refresh-tickers

      - name: Fetch feeds and build dashboard
        run: python run.py fetch build

      - name: Commit updated data and dashboard
        run: |
          git config user.name "signal-desk-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/intel.db data/marketcap_cache.json dashboard.html data.json || true
          git add data/tickers_sec.json 2>/dev/null || true
          git commit -m "auto: refresh $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "nothing to commit"
          git pull --rebase --autostash
          git push
