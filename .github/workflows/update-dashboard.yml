name: Update dashboard

on:
  schedule:
    - cron: "7 * * * *"     # :07 past each hour — avoids the :00 congestion spike
    - cron: "7 6 * * 0"     # Weekly SEC ticker refresh (Sunday 06:07 UTC)
  workflow_dispatch: {}     # manual + external-cron trigger

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false  # let backed-up runs drain sequentially; timeout-minutes: 5
                              # below already caps any single hung run, so false is safe.
                              # true was silently compounding GitHub's scheduler delays:
                              # batched releases cancelled all-but-last of queued runs,
                              # producing apparent gaps of 7-14h on an hourly cron.

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5      # bounds any single hung run; makes cancel-in-progress: false safe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"       # cache installed packages across runs — saves ~35s per run

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Weekly ticker refresh (Sundays only)
        if: github.event.schedule == '7 6 * * 0'
        run: python run.py refresh-tickers

      - name: Fetch feeds and build dashboard
        run: python run.py fetch build

      - name: Commit updated data and dashboard
        run: |
          git config user.name "signal-desk-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "auto: refresh $(date -u +'%Y-%m-%d %H:%M UTC')" || { echo "nothing to commit"; exit 0; }
          # Retry push up to 5x; on conflict, take OUR generated files (bot wins
          # for the binary db/json, since a human never hand-edits those).
          for i in 1 2 3 4 5; do
            git pull --rebase -X ours --autostash && git push && exit 0
            echo "push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "::error::push failed after 5 attempts"
          exit 1
