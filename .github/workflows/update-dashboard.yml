name: Update dashboard

on:
  schedule:
    # GitHub explicitly documents that scheduled workflows are best-effort and
    # get delayed most at the top of every hour/interval, since every repo's
    # cron targets :00/:15/:30/:45 simultaneously. Offsetting to :04/:19/:34/:49
    # queues behind less contention. Still no guarantee — see README for the
    # external-cron (cron-job.org -> workflow_dispatch) fallback if this still
    # drifts past ~20 min.
    - cron: "4,19,34,49 * * * *"
    - cron: "0 6 * * 0"          # Weekly SEC ticker refresh (Sunday 06:00 UTC)
  workflow_dispatch: {}          # manual + external-cron trigger

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Weekly ticker refresh (Sundays only)
        if: github.event.schedule == '0 6 * * 0'
        run: python run.py refresh-tickers

      - name: Fetch feeds and build dashboard
        run: python run.py fetch build

      - name: Commit updated data and dashboard
        run: |
          git config user.name "signal-desk-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "auto: refresh $(date -u +'%Y-%m-%d %H:%M UTC')" || { echo "nothing to commit"; exit 0; }
          # Retry push up to 5x; on conflict, take OUR generated files (bot wins
          # for the binary db/json, since a human never hand-edits those).
          for i in 1 2 3 4 5; do
            git pull --rebase -X ours --autostash && git push && exit 0
            echo "push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "::error::push failed after 5 attempts"
          exit 1
